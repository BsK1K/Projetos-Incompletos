version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: game-store-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamestore
      POSTGRES_PASSWORD: gamestore123
      POSTGRES_DB: game_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamestore -d game_store"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
