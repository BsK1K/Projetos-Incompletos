<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magis5 ERP — Separação de Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --border2: #444c56;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #f78166;
    --accent2: #79c0ff;
    --accent3: #56d364;
    --accent4: #e3b341;
    --accent5: #bc8cff;
    --red: #f85149;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TOPBAR */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent5) 100%);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--mono);
    color: white;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text2);
    font-family: var(--mono);
    background: var(--bg3);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent3);
    background: rgba(86,211,100,0.1);
    border: 1px solid rgba(86,211,100,0.3);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    min-height: calc(100vh - 52px);
  }

  .main-panel {
    border-right: 1px solid var(--border);
    overflow: auto;
  }

  .side-panel {
    overflow: auto;
    background: var(--bg2);
  }

  /* TOOLBAR */
  .toolbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: var(--bg2);
  }

  .toolbar-section {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar-label {
    font-size: 11px;
    color: var(--text2);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 340px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 13px;
    pointer-events: none;
  }

  input[type="text"], input[type="date"], select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: var(--accent2);
  }

  #searchInput {
    padding-left: 32px;
    width: 100%;
  }

  select {
    cursor: pointer;
  }

  select option {
    background: var(--bg3);
  }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent2);
    color: #0d1117;
    border-color: var(--accent2);
  }
  .btn-primary:hover { background: #9ecfff; }

  .btn-success {
    background: transparent;
    color: var(--accent3);
    border-color: rgba(86,211,100,0.4);
  }
  .btn-success:hover { background: rgba(86,211,100,0.1); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: rgba(248,81,73,0.4);
  }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border-color: var(--border);
  }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }

  .btn-print {
    background: linear-gradient(135deg, var(--accent), var(--accent5));
    color: white;
    border: none;
    font-weight: 600;
  }
  .btn-print:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-print:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* STATS BAR */
  .stats-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
  }

  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-num { color: var(--text); font-weight: 600; }
  .stat-num.accent { color: var(--accent2); }
  .stat-num.green { color: var(--accent3); }
  .stat-num.yellow { color: var(--accent4); }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  th {
    background: var(--bg3);
    color: var(--text2);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }

  th:first-child { padding-left: 16px; width: 40px; }

  td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }
  tr.selected td { background: rgba(121,192,255,0.06); }

  .td-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }

  .td-product {
    font-weight: 500;
    color: var(--text);
    max-width: 260px;
  }

  .td-sku {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
  }

  .td-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }

  .loja-badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .loja-1 { background: rgba(121,192,255,0.12); color: var(--accent2); border: 1px solid rgba(121,192,255,0.2); }
  .loja-2 { background: rgba(86,211,100,0.12); color: var(--accent3); border: 1px solid rgba(86,211,100,0.2); }
  .loja-3 { background: rgba(247,129,102,0.12); color: var(--accent); border: 1px solid rgba(247,129,102,0.2); }
  .loja-4 { background: rgba(188,140,255,0.12); color: var(--accent5); border: 1px solid rgba(188,140,255,0.2); }
  .loja-5 { background: rgba(227,179,65,0.12); color: var(--accent4); border: 1px solid rgba(227,179,65,0.2); }

  .checkbox-cell { width: 40px; text-align: center; }

  input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--accent2);
    cursor: pointer;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* PAGINATION */
  .pagination {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
  }

  .page-btns { display: flex; gap: 4px; }
  .page-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--mono);
    transition: all 0.1s;
  }
  .page-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .page-btn.active { background: var(--accent2); color: #0d1117; border-color: var(--accent2); font-weight: 600; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* SIDE PANEL */
  .side-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .side-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* LOG */
  #logArea {
    padding: 12px 20px;
    max-height: calc(100vh - 52px - 46px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-entry {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-family: var(--mono);
    border-left: 2px solid transparent;
    background: var(--bg3);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-time {
    color: var(--text3);
    margin-right: 6px;
  }

  .log-search { border-left-color: var(--accent2); }
  .log-search .log-action { color: var(--accent2); }

  .log-select { border-left-color: var(--accent4); }
  .log-select .log-action { color: var(--accent4); }

  .log-print { border-left-color: var(--accent3); }
  .log-print .log-action { color: var(--accent3); }

  .log-clear { border-left-color: var(--red); }
  .log-clear .log-action { color: var(--red); }

  .log-info { border-left-color: var(--text3); }
  .log-info .log-action { color: var(--text2); }

  .log-msg { color: var(--text); line-height: 1.5; }

  /* PRINT MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 540px;
    max-width: 90vw;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-title .icon { font-size: 18px; }

  .modal-body {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .print-summary {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    line-height: 2;
  }

  .print-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .print-item:last-child { border-bottom: none; }
  .print-item-id { font-family: var(--mono); color: var(--text3); width: 80px; }
  .print-item-name { color: var(--text); flex: 1; }
  .print-item-sku { font-family: var(--mono); color: var(--accent2); font-size: 11px; }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* HIGHLIGHT */
  .highlight {
    background: rgba(227,179,65,0.25);
    color: var(--accent4);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* TOOLTIP - automation target indicators */
  [data-automation] { position: relative; }

  .auto-indicator {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 8px;
    height: 8px;
    background: var(--accent5);
    border-radius: 50%;
    border: 2px solid var(--bg2);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">M5</div>
    <span class="logo-text">Magis5 ERP</span>
    <span class="logo-sub">v2.14.3-sim</span>
  </div>
  <div class="topbar-right">
    <span class="badge">● SIMULADOR ATIVO</span>
    <span style="font-size:12px;color:var(--text3);font-family:var(--mono)" id="clockDisplay"></span>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- MAIN PANEL -->
  <div class="main-panel">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <!-- Search -->
      <div class="toolbar-section" style="flex:1;min-width:200px;max-width:340px">
        <div class="search-wrap" style="flex:1">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Buscar produto, SKU..." data-automation="search-input" />
        </div>
      </div>

      <button class="btn btn-primary" id="btnBuscar" data-automation="search-btn">
        ↵ Buscar
      </button>

      <!-- Loja filter -->
      <div class="toolbar-section">
        <select id="filterLoja" data-automation="filter-loja">
          <option value="">Todas as Lojas</option>
          <option value="Shopee Loja 1">Shopee Loja 1</option>
          <option value="Shopee Loja 2">Shopee Loja 2</option>
          <option value="Mercado Livre">Mercado Livre</option>
          <option value="Amazon">Amazon</option>
          <option value="Magalu">Magalu</option>
        </select>
      </div>

      <!-- Date filter -->
      <div class="toolbar-section">
        <input type="date" id="filterData" data-automation="filter-date" />
      </div>

      <button class="btn btn-ghost" id="btnClearFilters">✕ Limpar</button>

      <!-- PRINT BTN -->
      <button class="btn btn-print" id="btnImprimir" disabled data-automation="print-btn">
        🖨 Imprimir Selecionados
      </button>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-item">
        Total: <span class="stat-num" id="totalCount">0</span>
      </div>
      <div class="stat-item">
        Filtrados: <span class="stat-num accent" id="filteredCount">0</span>
      </div>
      <div class="stat-item">
        Selecionados: <span class="stat-num green" id="selectedCount">0</span>
      </div>
      <div class="stat-item" id="searchTermDisplay" style="display:none">
        Busca: <span class="stat-num yellow" id="searchTermText"></span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table id="pedidosTable">
        <thead>
          <tr>
            <th class="checkbox-cell">
              <input type="checkbox" id="checkAll" data-automation="check-all" title="Selecionar todos" />
            </th>
            <th>Nº Pedido</th>
            <th>Produto</th>
            <th>SKU</th>
            <th>Data</th>
            <th>Loja</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="icon">📭</div>
        <p>Nenhum pedido encontrado para os filtros aplicados.</p>
      </div>
    </div>

    <!-- PAGINATION -->
    <div class="pagination">
      <span id="pageInfo"></span>
      <div class="page-btns" id="pageBtns"></div>
    </div>

  </div><!-- /main-panel -->

  <!-- SIDE PANEL (LOG) -->
  <div class="side-panel">
    <div class="side-header">
      <div class="side-dot"></div>
      Log de Operações
      <button class="btn btn-ghost" style="margin-left:auto;padding:3px 8px;font-size:11px" id="btnClearLog">Limpar</button>
    </div>
    <div id="logArea"></div>
  </div>

</div><!-- /layout -->

<!-- PRINT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <span class="icon">🖨</span>
        Impressão de Etiquetas
      </div>
      <button class="btn btn-ghost" style="padding:4px 8px" id="btnCloseModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="print-summary" id="printSummary"></div>
      <div id="printList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="btnCancelPrint">Cancelar</button>
      <button class="btn btn-print" id="btnConfirmPrint">✓ Confirmar Impressão</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA GENERATION
// ============================================================
const produtos = [
  // Nicho: Ninho / Redutor
  "Ninho Redutor Azul",
  "Ninho Redutor Rosa",
  "Ninho Redutor Cinza",
  "Ninho Posicionador Universal",
  "Redutor de Berço Branco",
  "Redutor Almofadado Premium",
  // Almofadas
  "Almofada de Amamentação 180cm",
  "Almofada Multifuncional Bebê",
  "Almofada Posicionadora Lateral",
  "Almofada Cervical Infantil",
  "Almofada Amamentação Minky",
  // Berço
  "Berço Portátil Dobrável",
  "Berço Grade Fixo Madeira",
  "Berço 3 em 1 Conversível",
  "Mini Berço Compacto",
  "Berço Americano Branco",
  // Carrinho
  "Carrinho Grande Travel System",
  "Carrinho Compacto Guarda-chuva",
  "Carrinho Bebê Conforto Conjunto",
  "Carrinho Passeio Leve",
  "Carrinho Duplo Gêmeos",
  // Kit / Higiene
  "Kit Higiene Bebê 8 Peças",
  "Kit Higiene Coelho Rosa",
  "Kit Cuidados Recém-Nascido",
  "Kit Banho Bebê Premium",
  "Kit Maternidade Completo",
  // Outros
  "Móbile Musical Giratório",
  "Cadeira de Balanço Elétrica",
  "Bolsa Maternidade Grande",
  "Cobertor Microfibra Bebê",
  "Manta Tricô Personalizada",
  "Projetor Estrelinha Noturno",
  "Bebê Conforto Grupo 0+",
  "Cadeirinha Carro Grupo 1/2/3",
  "Trocador Portátil Premium",
  "Termômetro Digital Infravermelho",
  "Monitor Bebê WiFi HD",
  "Chupeta Silicone Anatômica",
  "Mamadeira Anti-Cólica 260ml",
  "Esterilizador Elétrico 5L",
];

const lojas = [
  { nome: "Shopee Loja 1", cls: "loja-1" },
  { nome: "Shopee Loja 2", cls: "loja-2" },
  { nome: "Mercado Livre", cls: "loja-3" },
  { nome: "Amazon", cls: "loja-4" },
  { nome: "Magalu", cls: "loja-5" },
];

function randomDate(start, end) {
  const d = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
  return d.toISOString().split('T')[0];
}

function randomSku(produto) {
  const prefix = produto.split(' ').map(w => w[0].toUpperCase()).join('').slice(0, 4);
  return `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
}

function generatePedidos(count = 200) {
  const list = [];
  const dateStart = new Date('2025-01-01');
  const dateEnd = new Date('2025-03-01');
  for (let i = 1; i <= count; i++) {
    const produto = produtos[Math.floor(Math.random() * produtos.length)];
    const loja = lojas[Math.floor(Math.random() * lojas.length)];
    list.push({
      id: `PED-${String(i).padStart(5, '0')}`,
      produto,
      sku: randomSku(produto),
      data: randomDate(dateStart, dateEnd),
      loja: loja.nome,
      lojaCls: loja.cls,
    });
  }
  return list;
}

// ============================================================
// STATE
// ============================================================
const allPedidos = generatePedidos(200);
let filteredPedidos = [...allPedidos];
let selectedIds = new Set();
let currentSearch = '';
let currentLoja = '';
let currentData = '';
let currentPage = 1;
const PAGE_SIZE = 25;

// ============================================================
// LOG
// ============================================================
function addLog(type, action, msg) {
  const logArea = document.getElementById('logArea');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-action">[${action}]</span> <span class="log-msg">${msg}</span>`;
  logArea.prepend(entry);
  // Keep max 100 entries
  const entries = logArea.querySelectorAll('.log-entry');
  if (entries.length > 100) entries[entries.length - 1].remove();
}

// ============================================================
// FILTERING
// ============================================================
function applyFilters() {
  filteredPedidos = allPedidos.filter(p => {
    const search = currentSearch.toLowerCase();
    const matchSearch = !search ||
      p.produto.toLowerCase().includes(search) ||
      p.sku.toLowerCase().includes(search) ||
      p.id.toLowerCase().includes(search);
    const matchLoja = !currentLoja || p.loja === currentLoja;
    const matchData = !currentData || p.data === currentData;
    return matchSearch && matchLoja && matchData;
  });
  currentPage = 1;
  renderTable();
  updateStats();
}

// ============================================================
// RENDER TABLE
// ============================================================
function highlight(text, term) {
  if (!term) return text;
  const idx = text.toLowerCase().indexOf(term.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + `<span class="highlight">${text.slice(idx, idx + term.length)}</span>` + text.slice(idx + term.length);
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  const table = document.getElementById('pedidosTable');

  const start = (currentPage - 1) * PAGE_SIZE;
  const paginated = filteredPedidos.slice(start, start + PAGE_SIZE);

  if (paginated.length === 0) {
    tbody.innerHTML = '';
    table.style.display = 'none';
    emptyState.style.display = 'block';
    renderPagination();
    return;
  }

  table.style.display = '';
  emptyState.style.display = 'none';

  tbody.innerHTML = paginated.map(p => `
    <tr data-id="${p.id}" class="${selectedIds.has(p.id) ? 'selected' : ''}">
      <td class="checkbox-cell">
        <input type="checkbox" class="row-check" data-id="${p.id}" ${selectedIds.has(p.id) ? 'checked' : ''} />
      </td>
      <td class="td-id">${p.id}</td>
      <td class="td-product">${highlight(p.produto, currentSearch)}</td>
      <td class="td-sku">${p.sku}</td>
      <td class="td-date">${p.data}</td>
      <td><span class="loja-badge ${p.lojaCls}">${p.loja}</span></td>
    </tr>
  `).join('');

  // Row checkbox events
  tbody.querySelectorAll('.row-check').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.dataset.id;
      if (e.target.checked) selectedIds.add(id);
      else selectedIds.delete(id);
      updateRow(id);
      updateStats();
      updatePrintBtn();
      updateCheckAll();
    });
  });

  updateCheckAll();
  renderPagination();
}

function updateRow(id) {
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (row) row.className = selectedIds.has(id) ? 'selected' : '';
}

// ============================================================
// PAGINATION
// ============================================================
function renderPagination() {
  const totalPages = Math.ceil(filteredPedidos.length / PAGE_SIZE);
  const info = document.getElementById('pageInfo');
  const btns = document.getElementById('pageBtns');

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, filteredPedidos.length);
  info.textContent = filteredPedidos.length > 0 ? `${start}–${end} de ${filteredPedidos.length}` : '';

  if (totalPages <= 1) { btns.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage-1 && i <= currentPage+1)) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage-2 || i === currentPage+2) {
      html += `<span style="color:var(--text3);padding:4px 4px;font-size:12px">…</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  btns.innerHTML = html;
}

function goPage(page) {
  const totalPages = Math.ceil(filteredPedidos.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderTable();
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  document.getElementById('totalCount').textContent = allPedidos.length;
  document.getElementById('filteredCount').textContent = filteredPedidos.length;
  document.getElementById('selectedCount').textContent = selectedIds.size;

  const display = document.getElementById('searchTermDisplay');
  if (currentSearch) {
    display.style.display = 'flex';
    document.getElementById('searchTermText').textContent = `"${currentSearch}"`;
  } else {
    display.style.display = 'none';
  }
}

// ============================================================
// SELECT ALL
// ============================================================
function updateCheckAll() {
  const checkAll = document.getElementById('checkAll');
  const pageIds = filteredPedidos.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE).map(p => p.id);
  const allChecked = pageIds.length > 0 && pageIds.every(id => selectedIds.has(id));
  const someChecked = pageIds.some(id => selectedIds.has(id));
  checkAll.checked = allChecked;
  checkAll.indeterminate = someChecked && !allChecked;
}

document.getElementById('checkAll').addEventListener('change', function(e) {
  // Select ALL filtered (not just current page)
  filteredPedidos.forEach(p => {
    if (e.target.checked) selectedIds.add(p.id);
    else selectedIds.delete(p.id);
  });
  if (e.target.checked) {
    addLog('select', 'SELEÇÃO', `${filteredPedidos.length} pedidos selecionados (todos filtrados)`);
  } else {
    addLog('clear', 'SELEÇÃO', 'Seleção limpa');
  }
  renderTable();
  updateStats();
  updatePrintBtn();
});

// ============================================================
// PRINT BTN
// ============================================================
function updatePrintBtn() {
  const btn = document.getElementById('btnImprimir');
  btn.disabled = selectedIds.size === 0;
  if (selectedIds.size > 0) {
    btn.textContent = `🖨 Imprimir ${selectedIds.size} Selecionados`;
  } else {
    btn.textContent = '🖨 Imprimir Selecionados';
  }
}

// ============================================================
// SEARCH
// ============================================================
function doSearch() {
  const term = document.getElementById('searchInput').value.trim();
  const prev = currentSearch;
  currentSearch = term;
  applyFilters();
  if (term) {
    addLog('search', 'BUSCA', `Palavra-chave: "${term}" → ${filteredPedidos.length} resultado(s)`);
  } else if (prev) {
    addLog('info', 'BUSCA', 'Busca limpa');
  }
}

document.getElementById('btnBuscar').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// FILTERS
document.getElementById('filterLoja').addEventListener('change', e => {
  currentLoja = e.target.value;
  applyFilters();
  if (currentLoja) addLog('info', 'FILTRO', `Loja: ${currentLoja}`);
});

document.getElementById('filterData').addEventListener('change', e => {
  currentData = e.target.value;
  applyFilters();
  if (currentData) addLog('info', 'FILTRO', `Data: ${currentData}`);
});

document.getElementById('btnClearFilters').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterLoja').value = '';
  document.getElementById('filterData').value = '';
  currentSearch = '';
  currentLoja = '';
  currentData = '';
  applyFilters();
  addLog('clear', 'FILTROS', 'Todos os filtros limpos');
});

// ============================================================
// PRINT MODAL
// ============================================================
document.getElementById('btnImprimir').addEventListener('click', () => {
  if (selectedIds.size === 0) return;
  const selected = allPedidos.filter(p => selectedIds.has(p.id));

  // Summary
  const summary = document.getElementById('printSummary');
  summary.innerHTML = `
    Total de etiquetas: <strong style="color:var(--text)">${selected.length}</strong><br>
    Lojas: <strong style="color:var(--text)">${[...new Set(selected.map(p=>p.loja))].join(', ')}</strong><br>
    Palavra-chave ativa: <strong style="color:var(--accent4)">${currentSearch || '(nenhuma)'}</strong>
  `;

  // List
  const list = document.getElementById('printList');
  list.innerHTML = selected.map(p => `
    <div class="print-item">
      <span class="print-item-id">${p.id}</span>
      <span class="print-item-name">${p.produto}</span>
      <span class="print-item-sku">${p.sku}</span>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
});

document.getElementById('btnCloseModal').addEventListener('click', closeModal);
document.getElementById('btnCancelPrint').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('btnConfirmPrint').addEventListener('click', () => {
  const selected = allPedidos.filter(p => selectedIds.has(p.id));
  const ids = selected.map(p => p.id).join(', ');
  const kw = currentSearch || '(sem filtro)';
  addLog('print', 'IMPRESSÃO', `${selected.length} etiquetas enviadas para impressão | Keyword: "${kw}" | IDs: ${ids.slice(0,80)}${ids.length>80?'...':''}`);

  // Clear selection after print
  selectedIds.clear();
  closeModal();
  renderTable();
  updateStats();
  updatePrintBtn();
});

// ============================================================
// LOG CLEAR
// ============================================================
document.getElementById('btnClearLog').addEventListener('click', () => {
  document.getElementById('logArea').innerHTML = '';
});

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('pt-BR');
}
setInterval(updateClock, 1000);
updateClock();

// ============================================================
// INIT
// ============================================================
function init() {
  applyFilters();
  addLog('info', 'SISTEMA', `Simulador iniciado — ${allPedidos.length} pedidos carregados`);
  addLog('info', 'PLUGIN', 'Aguardando conexão do plugin de automação...');
}

init();

// ============================================================
// AUTOMATION API (for plugin communication)
// Expõe funções globais que o plugin pode chamar via content script
// ============================================================
window.MagisAPI = {
  // Set search term
  setSearch: (term) => {
    document.getElementById('searchInput').value = term;
  },
  // Click search
  clickSearch: () => {
    document.getElementById('btnBuscar').click();
  },
  // Select all filtered
  selectAll: () => {
    const checkAll = document.getElementById('checkAll');
    if (!checkAll.checked) {
      checkAll.checked = true;
      checkAll.dispatchEvent(new Event('change'));
    }
  },
  // Click print
  clickPrint: () => {
    document.getElementById('btnImprimir').click();
  },
  // Confirm print
  confirmPrint: () => {
    document.getElementById('btnConfirmPrint').click();
  },
  // Get stats
  getStats: () => ({
    total: allPedidos.length,
    filtered: filteredPedidos.length,
    selected: selectedIds.size,
    currentSearch,
  }),
  // Log from plugin
  pluginLog: (type, action, msg) => addLog(type, action, msg),
};

console.log('[MagisAPI] Simulador pronto. API exposta em window.MagisAPI');
</script>
</body>
</html>
